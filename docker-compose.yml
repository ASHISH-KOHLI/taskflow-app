volumes:
  postgres_data:
  redis_data:

networks:
  taskflow_network:
    driver: bridge

services:

  postgres:
    image: postgres:15-alpine
    container_name: taskflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       taskflow
      POSTGRES_USER:     taskflow_user
      POSTGRES_PASSWORD: taskflow_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - taskflow_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow_user -d taskflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: taskflow_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - taskflow_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: taskflow_backend
    restart: unless-stopped
    environment:
      NODE_ENV:    development
      PORT:        4000
      APP_VERSION: 1.0.0
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     taskflow
      DB_USER:     taskflow_user
      DB_PASSWORD: taskflow_pass
      REDIS_HOST:  redis
      REDIS_PORT:  6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "4000:4000"
    networks:
      - taskflow_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://localhost:4000/health/live',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:4000}
    container_name: taskflow_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - taskflow_network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/index.html > /dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
